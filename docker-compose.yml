services:
  # PostgreSQL 数据库
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: neuro-novels-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: neuro_novels
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Nuxt.js 应用
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro-novels-app
    restart: unless-stopped
    ports:
      - "3380:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/neuro_novels?schema=public
      - JWT_SECRET=neuro-sama-secret-key-2024-super-secure
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed &&
        node .output/server/index.mjs
      "

volumes:
  postgres_data:
